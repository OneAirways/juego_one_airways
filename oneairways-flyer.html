<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>One Airways — Un toque para volar</title>
<style>
  /* ============================================================
     ONE AIRWAYS · ENDLESS FLYER
     Branding: navy #0B1120 · orange #EC6519 · accent #38bdf8
     Vanilla JS + Canvas. Sin dependencias externas.
     ============================================================ */

  :root{
    --oa-navy:#0B1120;
    --oa-navy-2:#111a2e;
    --oa-orange:#EC6519;
    --oa-orange-light:#F4893F;
    --accent:#38bdf8;
    --text:#e8edf5;
    --text-dim:#9fb0c7;
  }

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#6ec1ef;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    color:var(--text);
    user-select:none;-webkit-user-select:none;
    touch-action:none;
  }

  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(#3d9be0,#6ec1ef 45%,#d6f0ff);
  }
  canvas{display:block;width:100%;height:100%;}

  /* ---- Overlays (start / game over) ---- */
  .overlay{
    position:fixed;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
    background:rgba(11,17,32,0.72);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    transition:opacity .25s ease;
  }
  .overlay.hidden{opacity:0;pointer-events:none;}

  /* ---- Logo real ---- */
  .brand-logo{ width:min(280px,74vw); height:auto; margin-bottom:14px; }
  .brand-logo.small{ width:min(200px,56vw); margin-bottom:10px; }

  /* ---- Marca de agua in-game ---- */
  #watermark{
    position:fixed; right:12px; bottom:12px; z-index:6;
    width:128px; height:auto; opacity:.82; pointer-events:none;
    padding:6px 9px; border-radius:10px;
    background:rgba(11,17,32,0.30);
    backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
    transition:opacity .2s ease;
  }
  #watermark.hidden{ opacity:0; }
  @media (max-width:600px){ #watermark{ width:104px; } }

  /* ---- Logo placeholder (start) ---- */
  .logo{
    display:flex;align-items:center;gap:12px;margin-bottom:8px;
  }
  .logo .mark{
    width:46px;height:46px;border-radius:11px;
    background:linear-gradient(135deg,var(--oa-orange),var(--oa-orange-light));
    display:flex;align-items:center;justify-content:center;
    font-size:24px;box-shadow:0 6px 20px rgba(236,101,25,.35);
  }
  .logo .name{
    font-size:26px;font-weight:800;letter-spacing:.06em;
  }
  .logo .name b{color:var(--oa-orange);font-weight:800;}

  .subtitle{
    font-size:15px;color:var(--text-dim);letter-spacing:.18em;
    text-transform:uppercase;margin-bottom:30px;
  }

  .cta{
    background:var(--oa-orange);color:#fff;border:none;
    padding:15px 38px;border-radius:40px;
    font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;
    box-shadow:0 8px 26px rgba(236,101,25,.4);
    transition:transform .12s ease,background .2s ease;
    animation:pulse 1.8s ease-in-out infinite;
  }
  .cta:hover{background:var(--oa-orange-light);transform:translateY(-2px);}
  .cta:active{transform:translateY(1px);}
  @keyframes pulse{0%,100%{box-shadow:0 8px 26px rgba(236,101,25,.4);}50%{box-shadow:0 8px 38px rgba(236,101,25,.7);}}

  .howto{
    margin-top:22px;font-size:13.5px;color:var(--text-dim);
    max-width:300px;line-height:1.6;
  }

  /* ---- Big number on game over ---- */
  .go-title{font-size:30px;font-weight:800;color:var(--oa-orange);margin-bottom:18px;letter-spacing:.02em;}
  .scoreboard{display:flex;gap:38px;margin-bottom:26px;}
  .scoreboard .box .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--text-dim);}
  .scoreboard .box .num{font-size:42px;font-weight:800;line-height:1.1;}
  .scoreboard .box .num.best{color:var(--accent);}
  .newbest{font-size:13px;color:var(--accent);margin-bottom:18px;letter-spacing:.1em;text-transform:uppercase;}
  .newbest.hidden{display:none;}

  /* ---- Footer brand line (tagline + coming soon) ---- */
  .brandline{
    position:absolute;bottom:20px;left:0;right:0;text-align:center;
    font-size:12px;color:var(--text-dim);letter-spacing:.05em;
  }
  .brandline .tag{color:var(--text);font-style:italic;}
  .brandline .soon{
    display:inline-block;margin-top:6px;
    border:1px solid rgba(56,189,248,.4);border-radius:30px;
    padding:3px 12px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
  }

  /* ---- In-game HUD ---- */
  #hud{
    position:fixed;top:0;left:0;right:0;z-index:8;
    display:flex;align-items:flex-start;
    padding:16px 20px;pointer-events:none;
    transition:opacity .2s ease;
  }
  #hud.hidden{opacity:0;}
  #hud .hud-left{display:flex;flex-direction:column;gap:2px;}
  #hud .live-score{font-size:40px;font-weight:800;line-height:1;color:var(--oa-orange);
    text-shadow:0 2px 0 #fff, 0 3px 10px rgba(0,0,0,.18);}
  #hud .live-best{font-size:13px;color:#234;font-weight:600;letter-spacing:.04em;
    text-shadow:0 1px 2px rgba(255,255,255,.6);}
  #hud .live-best b{color:#0c4a6e;font-size:14px;}

  /* ---- Top-right controls (lang + sound) ---- */
  .controls{position:fixed;top:14px;right:14px;z-index:12;display:flex;gap:8px;}
  .ctrl-btn{
    background:rgba(17,26,46,.85);border:1px solid rgba(56,189,248,.25);
    color:var(--text);border-radius:9px;width:42px;height:34px;
    font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:border-color .2s ease,background .2s ease;
  }
  .ctrl-btn:hover{border-color:var(--accent);background:rgba(56,189,248,.12);}

  @media (max-width:600px){
    .logo .name{font-size:22px;}
    .go-title{font-size:25px;}
    .scoreboard .box .num{font-size:36px;}
    .scoreboard{gap:30px;}
    #hud .live-score{font-size:28px;}
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>
</div>

<!-- Top-right controls -->
<div class="controls">
  <button class="ctrl-btn" id="langBtn" title="Idioma / Language">EN</button>
  <button class="ctrl-btn" id="soundBtn" title="Sonido / Sound">🔊</button>
</div>

<!-- In-game HUD -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="live-score" id="liveScore">0</div>
    <div class="live-best"><span data-i18n="best">Récord</span> <b id="liveBest">0</b></div>
  </div>
</div>

<!-- Marca de agua del logo durante el vuelo -->
<img id="watermark" class="oa-logo hidden" alt="One Airways">

<!-- START overlay -->
<div class="overlay" id="startScreen">
  <!-- Logo real One Airways -->
  <img class="oa-logo brand-logo" alt="One Airways">
  <div class="subtitle" data-i18n="subtitle">Un toque para volar</div>
  <button class="cta" id="startBtn" data-i18n="start">TOCA PARA EMPEZAR</button>
  <div class="howto" data-i18n="howto">Toca, haz clic o pulsa espacio para ascender. Esquiva las tormentas y recoge puntos.</div>
  <div class="brandline">
    <span class="tag" data-i18n="tagline">El Espíritu de la Amistad</span><br>
    <span class="soon" data-i18n="soon">Próximamente</span>
  </div>
</div>

<!-- GAME OVER overlay -->
<div class="overlay hidden" id="gameOverScreen">
  <img class="oa-logo brand-logo small" alt="One Airways">
  <div class="go-title" data-i18n="gameover">¡VUELO TERMINADO!</div>
  <div class="newbest hidden" id="newBest" data-i18n="newbest">¡Nuevo récord!</div>
  <div class="scoreboard">
    <div class="box">
      <div class="lbl" data-i18n="score">Puntuación</div>
      <div class="num" id="finalScore">0</div>
    </div>
    <div class="box">
      <div class="lbl" data-i18n="best">Récord</div>
      <div class="num best" id="finalBest">0</div>
    </div>
  </div>
  <button class="cta" id="retryBtn" data-i18n="retry">VOLVER A VOLAR</button>
  <div class="brandline">
    <span class="tag" data-i18n="tagline">El Espíritu de la Amistad</span><br>
    <span class="soon" data-i18n="soon">Próximamente</span>
  </div>
</div>

function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{

    if(I18N[lang][k]!==undefined) el.textContent = I18N[lang][k];

/* ---------------------- Canvas ---------------------- */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W*DPR);
  canvas.height = Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize);
resize();

/* ---------------------- Sprite del avión ---------------------- */
const planeImg = new Image();
let planeReady = false;
let planeAspect = 3.8; // se ajusta al cargar la imagen real
planeImg.onload  = ()=>{ planeReady = true; if(planeImg.naturalHeight) planeAspect = planeImg.naturalWidth/planeImg.naturalHeight; };
planeImg.onerror = ()=>{ planeReady = false; }; // se queda el placeholder
// Si pones PLANE_IMG usa eso; si no, intenta cargar "ec-otv.png" de la misma carpeta.
planeImg.src = PLANE_IMG || "ec-otv.png";

/* ---------------------- Estado del juego ---------------------- */
const STATE = {MENU:0, PLAY:1, OVER:2};
let state = STATE.MENU;

let best = 0;
try { best = parseInt(localStorage.getItem("oa_flyer_best")||"0",10)||0; } catch(e){}

const plane = { x:0, y:0, vy:0, r:20, tilt:0 };
let obstacles=[], tokens=[], particles=[], clouds=[];
let score=0, scrollSpeed=0, spawnTimer=0, frame=0, flashT=0;
let lastGapCenter=0; // centro del hueco anterior (para garantizar huecos alcanzables)

/* Físicas (en unidades "por frame a 60fps", escaladas por dt) */
const GRAVITY = 0.36;
const LIFT = -6.8;
const MAX_FALL = 8.5;
const BASE_SPEED = 2.8;

function planeSize(){
  // Tamaño del avión relativo a la pantalla, respetando el aspecto real de la foto
  const h = Math.max(40, Math.min(W,H)*0.09);
  return {w:h*planeAspect, h:h};
}

/* ---------------------- Sol ---------------------- */
function drawSun(){
  const sx = W*0.16, sy = H*0.14, R = Math.max(34, Math.min(W,H)*0.075);
  // halo grande
  let g = ctx.createRadialGradient(sx,sy,R*0.4, sx,sy,R*5.2);
  g.addColorStop(0,"rgba(255,246,214,0.55)");
  g.addColorStop(0.25,"rgba(255,231,160,0.22)");
  g.addColorStop(1,"rgba(255,231,160,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,R*5.2,0,7); ctx.fill();
  // rayos suaves
  ctx.save();
  ctx.translate(sx,sy);
  ctx.rotate(frame*0.0015);
  ctx.fillStyle="rgba(255,240,190,0.16)";
  for(let i=0;i<12;i++){
    ctx.rotate(Math.PI/6);
    ctx.beginPath(); ctx.moveTo(0,-R*1.3); ctx.lineTo(R*0.28,-R*3.4); ctx.lineTo(-R*0.28,-R*3.4); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  // disco
  g = ctx.createRadialGradient(sx,sy,1, sx,sy,R);
  g.addColorStop(0,"#fffdf4"); g.addColorStop(0.6,"#fff2c8"); g.addColorStop(1,"#ffe49a");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,R,0,7); ctx.fill();
}

/* ---------------------- Nubes de fondo (blancas, parallax) ---------------------- */
function initClouds(){
  clouds=[];
  for(let i=0;i<6;i++){
    clouds.push({
      x:Math.random()*W, y:40+Math.random()*H*0.8,
      s:0.6+Math.random()*1.1, sp:0.15+Math.random()*0.45, o:0.7+Math.random()*0.25
    });
  }
}
function drawBgCloud(c){
  ctx.save();
  ctx.globalAlpha=c.o;
  const r=30*c.s, x=c.x, y=c.y;
  // sombra inferior sutil
  ctx.fillStyle="rgba(190,212,235,0.6)";
  blob(x,y+r*0.18,r);
  // cuerpo blanco
  ctx.fillStyle="#ffffff";
  blob(x,y,r);
  ctx.restore();
}
function blob(x,y,r){
  ctx.beginPath();
  ctx.arc(x,y,r,0,7);
  ctx.arc(x+r*1.05,y+5,r*0.8,0,7);
  ctx.arc(x-r*1.05,y+7,r*0.78,0,7);
  ctx.arc(x+r*0.35,y-r*0.62,r*0.72,0,7);
  ctx.arc(x-r*0.5,y-r*0.4,r*0.6,0,7);
  ctx.fill();
}

/* ---------------------- Tormentas (obstáculos tipo nube) ---------------------- */
function obstacleW(){ return Math.max(64, W*0.14); }

// Genera los "bultos" (puffs) de un banco de nubes una sola vez por obstáculo.
// edgeY = línea del hueco. fromTop=true: el banco cuelga desde arriba.
function makeBankPuffs(w, edgeY, fromTop){
  const puffs=[];
  const r = Math.max(24, w*0.42);
  const cols = Math.max(3, Math.round(w/(r*0.7)));
  const step = w/cols;
  for(let i=0;i<=cols;i++){
    const baseX = i*step;
    const rr = r*(0.72+Math.random()*0.5);
    // bulto del borde interior (define la silueta hacia el hueco)
    let y = fromTop ? edgeY - rr*0.5 : edgeY + rr*0.5;
    puffs.push({dx:baseX+(Math.random()*step*0.3-step*0.15), y, r:rr, edge:true});
    // relleno hacia el lado fuera de pantalla
    for(let k=0;k<8;k++){
      y += fromTop ? -rr*0.85 : rr*0.85;
      if(fromTop && y < -rr) break;
      if(!fromTop && y > H+rr) break;
      puffs.push({dx:baseX+(Math.random()*step*0.5-step*0.25), y, r:r*(0.66+Math.random()*0.5), edge:false});
    }
  }
  return puffs;
}

function drawCloudBank(o, fromTop){
  const puffs = fromTop ? o.topPuffs : o.botPuffs;
  const edgeY = fromTop ? o.topH : o.botY;

  // 1) Cuerpo: unión de círculos del mismo color (gris tormenta)
  ctx.save();
  ctx.fillStyle = "#7c8699";
  for(const p of puffs){ ctx.beginPath(); ctx.arc(o.x+p.dx, p.y, p.r, 0, 7); ctx.fill(); }

  // 2) Sombra hacia el hueco (base oscura de cumulonimbo)
  ctx.fillStyle = "rgba(74,82,99,0.55)";
  for(const p of puffs){ if(!p.edge) continue;
    ctx.beginPath(); ctx.arc(o.x+p.dx, p.y + (fromTop?p.r*0.30:-p.r*0.30), p.r*0.9, 0, 7); ctx.fill();
  }

  // 3) Luz en la cresta (lado opuesto al hueco)
  ctx.fillStyle = "rgba(255,255,255,0.45)";
  for(const p of puffs){ if(p.edge) continue;
    ctx.beginPath(); ctx.arc(o.x+p.dx - p.r*0.2, p.y - (fromTop?-p.r*0.3:p.r*0.3), p.r*0.5, 0, 7); ctx.fill();
  }
  ctx.restore();

  // 4) Línea-glow del borde del hueco (legibilidad del paso)
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.lineWidth = 3; ctx.shadowColor="rgba(255,255,255,0.6)"; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(o.x-6, edgeY); ctx.lineTo(o.x+o.w+6, edgeY); ctx.stroke();
  ctx.restore();
}

function drawStorm(o){
  drawCloudBank(o, true);
  drawCloudBank(o, false);
}

/* ---------------------- Spawning ---------------------- */
function spawnObstacle(){
  const w = obstacleW();
  const floor = Math.max(H*0.20, 132);
  const startGap = H*0.34;
  const gap = Math.max(startGap - Math.min(score*1.8, startGap-floor), floor); // se estrecha con el score
  const margin = 64;

  // Centro del hueco alcanzable desde el anterior (evita callejones sin salida).
  // Frames disponibles entre tormenta y tormenta ≈ spacing; el avión puede SUBIR
  // ~2.3 px/frame (lo difícil) y BAJAR más rápido por gravedad.
  const spacingFrames = Math.max(82, 130 - score*0.5);
  const maxUp   = Math.max(40, spacingFrames * 2.3 - gap/2); // margen para no salir por arriba
  const maxDown = spacingFrames * 4.5;
  const cMin = margin + gap/2;
  const cMax = H - margin - gap/2;
  let lo = Math.max(cMin, lastGapCenter - maxUp);
  let hi = Math.min(cMax, lastGapCenter + maxDown);
  if(lo > hi){ lo = cMin; hi = cMax; } // salvaguarda
  const center = lo + Math.random()*(hi-lo);
  lastGapCenter = center;

  const topH = center - gap/2;
  const botY = center + gap/2;
  const ob = {x:W+10, w, topH, botY, gap, passed:false, lightning:Math.random()<0.5};
  ob.topPuffs = makeBankPuffs(w, topH, true);
  ob.botPuffs = makeBankPuffs(w, botY, false);
  obstacles.push(ob);

  // token en el hueco (a veces)
  if(Math.random()<0.85){
    tokens.push({x:W+10+w/2, y:center + (Math.random()*40-20), r:13, taken:false, pulse:Math.random()*6});
  }
}

/* ---------------------- Partículas (estela naranja) ---------------------- */
function emitTrail(){
  particles.push({
    x:plane.x-planeSize().w*0.45, y:plane.y+ (Math.random()*8-4),
    vx:-1-Math.random()*1.5, vy:(Math.random()*1-0.5),
    life:1, r:3+Math.random()*3, c:"trail"
  });
}
function emitBurst(x,y,color){
  for(let i=0;i<14;i++){
    const a=Math.random()*7, sp=1.5+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2+Math.random()*3,c:color});
  }
}

/* ---------------------- Sonido (WebAudio, ligero) ---------------------- */
let audioCtx=null, muted=false;
function beep(freq,dur,type,vol){
  if(muted) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.value=vol||0.06;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+(dur||0.12));
    o.stop(audioCtx.currentTime+(dur||0.12));
  }catch(e){}
}
const sfx={
  flap:()=>beep(520,0.08,"triangle",0.04),
  coin:()=>{beep(740,0.07,"square",0.05);setTimeout(()=>beep(990,0.09,"square",0.05),60);},
  crash:()=>{beep(160,0.3,"sawtooth",0.08);}
};

/* ---------------------- Control ---------------------- */
function flap(){
  if(state===STATE.PLAY){
    plane.vy = LIFT;
    sfx.flap();
    for(let i=0;i<3;i++) emitTrail();
  }
}
function onTap(e){
  if(state===STATE.MENU){ startGame(); }
  else if(state===STATE.PLAY){ flap(); }
  // en OVER, los botones gestionan el reinicio
}
canvas.addEventListener("pointerdown", e=>{ e.preventDefault(); onTap(e); });
window.addEventListener("keydown", e=>{
  if(e.code==="Space"||e.code==="ArrowUp"){
    e.preventDefault();
    if(state===STATE.MENU) startGame();
    else if(state===STATE.PLAY) flap();
    else if(state===STATE.OVER) resetGame();
  }
});

/* ---------------------- Flujo de partidas ---------------------- */
function startGame(){
  resetVars();
  state=STATE.PLAY;
  startScreen.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
  hud.classList.remove("hidden");
  watermark.classList.remove("hidden");
}
function resetVars(){
  const ps=planeSize();
  plane.x = W*0.28;
  plane.y = H*0.45;
  plane.vy = -2.2; // leve impulso inicial: tiempo de reacción al arrancar
  plane.r = ps.h*0.36;
  obstacles=[]; tokens=[]; particles=[];
  score=0; scrollSpeed=BASE_SPEED; spawnTimer=0; frame=0; flashT=0;
  lastGapCenter=H*0.45; // primer hueco alcanzable desde la posición inicial del avión
  liveScore.textContent="0";
  liveBest.textContent = best;
  initClouds();
}
function resetGame(){ startGame(); }
function gameOver(){
  state=STATE.OVER;
  sfx.crash();
  flashT=1;
  emitBurst(plane.x,plane.y,"crash");
  const isNew = score>0 && score>best;
  if(isNew){ best=score; try{localStorage.setItem("oa_flyer_best",String(best));}catch(e){} }
  finalScore.textContent=score;
  finalBest.textContent=best;
  newBest.classList.toggle("hidden", !isNew);
  hud.classList.add("hidden");
  watermark.classList.add("hidden");
  setTimeout(()=>gameOverScreen.classList.remove("hidden"), 420);
}

/* ---------------------- Update ---------------------- */
function update(dt){
  frame++;
  // nubes de fondo
  clouds.forEach(c=>{
    c.x -= c.sp*dt*(state===STATE.PLAY?1:0.4);
    if(c.x < -80){ c.x=W+60; c.y=Math.random()*H*0.85; }
  });

  if(state!==STATE.PLAY){
    updateParticles(dt);
    return;
  }

  // dificultad creciente
  scrollSpeed = BASE_SPEED + Math.min(score*0.04, 2.6);

  // avión
  plane.vy += GRAVITY*dt;
  if(plane.vy>MAX_FALL) plane.vy=MAX_FALL;
  plane.y += plane.vy*dt;
  plane.tilt = Math.max(-0.45, Math.min(0.75, plane.vy*0.05));

  // techo (clamp) y suelo (crash)
  if(plane.y < plane.r){ plane.y=plane.r; plane.vy=0; }
  if(plane.y > H - plane.r){ plane.y=H-plane.r; return gameOver(); }

  // estela
  if(frame%2===0) emitTrail();

  // spawn de obstáculos
  spawnTimer -= dt;
  const spacing = Math.max(82, 130 - score*0.5); // frames entre tormentas
  if(spawnTimer<=0){ spawnObstacle(); spawnTimer = spacing; }

  // mover obstáculos + colisión + score
  for(const o of obstacles){
    o.x -= scrollSpeed*dt;
    if(!o.passed && o.x + o.w < plane.x){
      o.passed=true; score++; liveScore.textContent=score;
    }
    // colisión (hitbox circular del avión)
    if(circleRectHit(plane.x,plane.y,plane.r*0.82, o.x,0,o.w,o.topH) ||
       circleRectHit(plane.x,plane.y,plane.r*0.82, o.x,o.botY,o.w,H-o.botY)){
      return gameOver();
    }
  }
  obstacles = obstacles.filter(o=>o.x+o.w > -20);

  // tokens
  for(const t of tokens){
    t.x -= scrollSpeed*dt;
    t.pulse += 0.12*dt;
    if(!t.taken){
      const dx=plane.x-t.x, dy=plane.y-t.y;
      if(dx*dx+dy*dy < (plane.r+t.r)*(plane.r+t.r)){
        t.taken=true; score+=2; liveScore.textContent=score;
        sfx.coin(); emitBurst(t.x,t.y,"coin");
      }
    }
  }
  tokens = tokens.filter(t=>!t.taken && t.x+t.r > -20);

  updateParticles(dt);
}

function updateParticles(dt){
  for(const p of particles){
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.vy += 0.05*dt;
    p.life -= 0.03*dt;
  }
  particles = particles.filter(p=>p.life>0);
}

function circleRectHit(cx,cy,cr, rx,ry,rw,rh){
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy < cr*cr;
}

/* ---------------------- Render ---------------------- */
function render(){
  ctx.clearRect(0,0,W,H);

  // cielo azul claro de día
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,"#3d9be0");
  grd.addColorStop(0.45,"#6ec1ef");
  grd.addColorStop(1,"#d6f0ff");
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);

  // sol con destello (esquina superior izquierda, parallax muy leve)
  drawSun();

  // nubes de fondo blancas
  clouds.forEach(drawBgCloud);

  // obstáculos (nubes de tormenta)
  for(const o of obstacles){
    drawStorm(o);
    // rayo ocasional en el hueco
    if(o.lightning && frame%70<6){
      ctx.save();
      ctx.strokeStyle="rgba(255,238,120,0.95)"; ctx.lineWidth=2.5;
      ctx.shadowColor="rgba(255,230,90,0.8)"; ctx.shadowBlur=6;
      ctx.beginPath();
      let lx=o.x+o.w*0.5, ly=o.topH;
      ctx.moveTo(lx,ly);
      for(let s=0;s<4;s++){ lx+=(Math.random()*20-10); ly+=(o.botY-o.topH)/4; ctx.lineTo(lx,ly); }
      ctx.stroke(); ctx.restore();
    }
  }

  // tokens (orbes naranja)
  for(const t of tokens){
    const pr = t.r + Math.sin(t.pulse)*2;
    ctx.save();
    const g=ctx.createRadialGradient(t.x,t.y,1,t.x,t.y,pr*1.8);
    g.addColorStop(0,"rgba(244,137,63,0.9)");
    g.addColorStop(0.5,"rgba(236,101,25,0.85)");
    g.addColorStop(1,"rgba(236,101,25,0)");
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(t.x,t.y,pr*1.8,0,7); ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath(); ctx.arc(t.x,t.y,pr*0.42,0,7); ctx.fill();
    ctx.restore();
  }

  // partículas
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle = p.c==="coin" ? "#fbbf24" : (p.c==="crash" ? "#f87171" : "#EC6519");
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill();
    ctx.restore();
  }

  // avión
  drawPlane();

  // flash de choque
  if(flashT>0){
    ctx.fillStyle=`rgba(248,113,113,${flashT*0.35})`;
    ctx.fillRect(0,0,W,H);
    flashT-=0.04;
  }
}

function drawPlane(){
  const {w,h}=planeSize();
  ctx.save();
  ctx.translate(plane.x, plane.y);
  ctx.rotate(plane.tilt);

  if(planeReady){
    // FOTO REAL recortada del EC-OTV
    ctx.drawImage(planeImg, -w/2, -h/2, w, h);
  } else {
    // PLACEHOLDER (marco de foto, NO un avión dibujado) — sustituir por la foto real
    ctx.fillStyle="rgba(17,26,46,0.92)";
    roundRect(-w/2,-h/2,w,h,12); ctx.fill();
    ctx.setLineDash([7,6]);
    ctx.strokeStyle="rgba(56,189,248,0.8)"; ctx.lineWidth=2;
    roundRect(-w/2,-h/2,w,h,12); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="rgba(232,237,245,0.9)";
    ctx.font="700 "+Math.round(h*0.2)+"px -apple-system,Segoe UI,Arial";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("✈ EC-OTV", 0, -h*0.08);
    ctx.fillStyle="rgba(159,176,199,0.85)";
    ctx.font="600 "+Math.round(h*0.13)+"px -apple-system,Segoe UI,Arial";
    ctx.fillText(lang==="es"?"foto real aquí":"real photo here", 0, h*0.18);
  }
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ---------------------- Loop ---------------------- */
let last=performance.now();
function loop(now){
  let dt=(now-last)/16.667; // normalizado a 60fps
  if(dt>3) dt=3; // evita saltos tras pestaña inactiva
  last=now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

/* ---------------------- UI wiring ---------------------- */
const startScreen=document.getElementById("startScreen");
const gameOverScreen=document.getElementById("gameOverScreen");
const hud=document.getElementById("hud");
const liveScore=document.getElementById("liveScore");
const liveBest=document.getElementById("liveBest");
const finalScore=document.getElementById("finalScore");
const finalBest=document.getElementById("finalBest");
const newBest=document.getElementById("newBest");
const langBtn=document.getElementById("langBtn");
const soundBtn=document.getElementById("soundBtn");
const watermark=document.getElementById("watermark");

// Asignar el logo real a todas las imágenes de marca
if(LOGO_IMG){ document.querySelectorAll(".oa-logo").forEach(img=>{ img.src = LOGO_IMG; }); }

document.getElementById("startBtn").addEventListener("click", e=>{e.stopPropagation();startGame();});
document.getElementById("retryBtn").addEventListener("click", e=>{e.stopPropagation();resetGame();});
langBtn.addEventListener("click", ()=>{ lang = lang==="es"?"en":"es"; applyLang(); });
soundBtn.addEventListener("click", ()=>{ muted=!muted; soundBtn.textContent = muted?"🔇":"🔊"; });

liveBest.textContent=best;
finalBest.textContent=best;
applyLang();
initClouds();
requestAnimationFrame(loop);
</script>
